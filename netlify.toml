[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'No build step'"

[functions]
  node_bundler = "esbuild"
  # damit Funktionen die Parser unter scraper/ importieren können
  included_files = ["scraper/**"]

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200
